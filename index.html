<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMRA E-Commerce Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* RESET & TYPOGRAPHY */
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  body{background:#121212;color:#f5f5f5;line-height:1.6;}
  a{text-decoration:none;color:inherit;}
  img{max-width:100%;border-radius:10px;}
  .container{max-width:1200px;margin:2rem auto;padding:0 2rem;}
  
  /* HEADER */
  header{background:#1e1e1e;padding:2rem;text-align:center;position:sticky;top:0;z-index:10;}
  header h1{color:#ff6a00;}
  nav{margin-top:1rem;}
  nav a{margin:0 1rem;color:#f5f5f5;font-weight:600;transition:color 0.3s;}
  nav a:hover{color:#ffa64d;}
  
  /* PRODUCTS */
  .filter-buttons{text-align:center;margin-bottom:2rem;}
  .filter-buttons button{margin:0.3rem;padding:0.5rem 1rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:#ff6a00;color:#121212;transition:background 0.3s;}
  .filter-buttons button:hover{background:#ffa64d;}
  .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
  .product-card{background:#1e1e1e;padding:1rem;border-radius:12px;transition:transform 0.3s, box-shadow 0.3s;}
  .product-card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(255,106,0,0.4);}
  .product-card img{margin-bottom:0.5rem;}
  .product-card h3{color:#ff6a00;margin-bottom:0.5rem;}
  .product-card p{font-size:0.9rem;color:#ccc;margin-bottom:0.5rem;}
  .product-card button{background:#ff6a00;color:#121212;border:none;padding:0.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;transition:background 0.3s;}
  .product-card button:hover{background:#ffa64d;}
  
  /* CART */
  .cart{position:fixed;top:1rem;right:1rem;background:#ff6a00;color:#121212;padding:0.5rem 1rem;border-radius:12px;font-weight:600;cursor:pointer;z-index:100;}
  
  /* MODAL */
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}
  .modal-content{background:#1e1e1e;padding:2rem;border-radius:12px;max-width:500px;width:90%;position:relative;}
  .modal-content h3{color:#ff6a00;margin-bottom:1rem;}
  .modal-content p{color:#ddd;margin-bottom:1rem;}
  .close-btn{position:absolute;top:0.5rem;right:1rem;font-size:1.5rem;color:#fff;cursor:pointer;}
  
  /* CONTACT */
  #contact{text-align:center;margin-top:4rem;}
  #contact a{display:inline-block;margin:0.5rem;padding:0.75rem 1.5rem;border-radius:12px;background:#ff6a00;color:#121212;font-weight:600;transition:background 0.3s;}
  #contact a:hover{background:#ffa64d;}
  
  /* FOOTER */
  footer{text-align:center;padding:2rem 0;color:#777;margin-top:2rem;}
  
  /* RESPONSIVE */
  @media(max-width:768px){.product-card img{height:150px;object-fit:cover;}}
</style>
</head>
<body>

<header>
  <h1>DOMRA E-Commerce</h1>
  <nav>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<button class="cart" id="cart-button">Cart (0)</button>

<section id="products" class="container">
  <div class="filter-buttons">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('cable')">Cables</button>
    <button onclick="filterProducts('protector')">Protectors</button>
    <button onclick="filterProducts('charger')">Chargers</button>
  </div>
  <div class="products" id="product-list">
    <!-- Products will be generated by JS -->
  </div>
</section>

<section id="contact" class="container">
  <h2>Contact</h2>
  <p>Email: <a href="mailto:domraecomgmail.com">domraecom@gmail.com</a></p>
  <p>WhatsApp: <a href="https://wa.me/595982164843" target="_blank">+595 982 164843</a></p>
</section>

<footer>&copy; 2026 DOMRA. Designed & Developed by Alejandro Insfran.</footer>

<!-- MODAL -->
<div class="modal" id="product-modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <button onclick="addToCartModal()">Add to Cart</button>
  </div>
</div>

<script>
  // PRODUCT DATA
  const products = [
    {name:"Cable iPhone",desc:"Durable charging cable for iPhone devices.",category:"cable",img:"https://via.placeholder.com/250x150.png?text=Cable+iPhone"},
    {name:"Protector de Cable",desc:"Protects your charging cables from wear and tear.",category:"protector",img:"https://via.placeholder.com/250x150.png?text=Protector+de+Cable"},
    {name:"Wireless Charger",desc:"Fast wireless charger for smartphones.",category:"charger",img:"https://via.placeholder.com/250x150.png?text=Wireless+Charger"}
  ];

  let cart = [];
  let selectedProduct = null;
  const productList = document.getElementById('product-list');
  const cartButton = document.getElementById('cart-button');

  function renderProducts(filter='all'){
    productList.innerHTML = '';
    products.filter(p => filter==='all' || p.category===filter).forEach(p=>{
      const card = document.createElement('div');
      card.className='product-card';
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <button onclick="openModal('${p.name}')">View</button>
      `;
      productList.appendChild(card);
    });
  }

  function openModal(name){
    selectedProduct = products.find(p=>p.name===name);
    document.getElementById('modal-title').textContent = selectedProduct.name;
    document.getElementById('modal-desc').textContent = selectedProduct.desc;
    document.getElementById('product-modal').style.display='flex';
  }

  function closeModal(){document.getElementById('product-modal').style.display='none';}

  function addToCartModal(){
    if(selectedProduct){cart.push(selectedProduct.name); cartButton.textContent=`Cart (${cart.length})`; alert(`${selectedProduct.name} added to cart!`); closeModal();}
  }

  function filterProducts(category){renderProducts(category);}
  
  // INITIAL RENDER
  renderProducts();
</script>

</body>
</html>
