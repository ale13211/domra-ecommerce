<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMRA E-Commerce</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#121212;color:#f5f5f5;line-height:1.6;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;border-radius:10px;}
.container{max-width:1200px;margin:2rem auto;padding:0 2rem;}

header{background:#1e1e1e;padding:2rem;text-align:center;position:sticky;top:0;z-index:10;}
header h1{color:#ff6a00;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
.product-card{background:#1e1e1e;padding:1rem;border-radius:12px;transition:transform 0.3s, box-shadow 0.3s;}
.product-card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(255,106,0,0.4);}
.product-card img{margin-bottom:0.5rem;}
.product-card h3{color:#ff6a00;margin-bottom:0.5rem;}
.product-card p{font-size:0.9rem;color:#ccc;margin-bottom:0.5rem;}
.product-card button{background:#ff6a00;color:#121212;border:none;padding:0.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.3s;}
.product-card button:hover{background:#ffa64d;transform:scale(1.05);}

.cart{position:fixed;top:1rem;right:1rem;background:#ff6a00;color:#121212;padding:0.5rem 1rem;border-radius:12px;font-weight:600;cursor:pointer;z-index:100;}

.cart-modal{display:none;position:fixed;top:0;right:0;width:350px;height:100%;background:#1e1e1e;padding:1.5rem;box-shadow:-5px 0 20px rgba(0,0,0,0.5);z-index:1000;overflow-y:auto;transition:transform 0.3s;}
.cart-modal.show{display:block;transform:translateX(0);}
.cart-modal h3{color:#ff6a00;margin-bottom:1rem;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:1rem;color:#ddd;align-items:center;}
.cart-item button{background:#ff6a00;color:#121212;border:none;padding:0.2rem 0.5rem;border-radius:6px;font-weight:600;cursor:pointer;transition:all 0.3s;}
.cart-item button:hover{background:#ffa64d;transform:scale(1.1);}
.cart-total{margin-top:1rem;font-weight:700;color:#ff6a00;}
.close-cart{cursor:pointer;color:#fff;float:right;font-size:1.2rem;margin-top:-2rem;}

#toast{
  position: fixed;
  top: 1rem;
  right: 1rem;
  background: #ff6a00;
  color: #121212;
  padding: 1rem 1.5rem;
  border-radius: 12px;
  font-weight: 600;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease;
  z-index: 9999;
}

footer{text-align:center;padding:2rem 0;color:#777;margin-top:2rem;}
@media(max-width:768px){.product-card img{height:150px;object-fit:cover;}}
</style>
</head>
<body>

<header>
  <h1>DOMRA E-Commerce</h1>
</header>

<button class="cart" id="cart-button">Cart (0)</button>

<section class="container products" id="product-list">
  <!-- Productos generados por JS -->
</section>

<div class="cart-modal" id="cart-modal">
  <span class="close-cart" onclick="toggleCart()">✕</span>
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <button onclick="checkout()" style="margin-top:1rem;width:100%;background:#ff6a00;color:#121212;padding:0.7rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Confirm Order</button>
</div>

<div id="toast">Agregado al carrito!</div>

<footer>&copy; 2026 DOMRA. Designed & Developed by Alejandro Insfran.</footer>

<script>
const products=[
  {name:"Cable iPhone", desc:"Durable charging cable for iPhone.", category:"cable", price:15000,img:"cable-iphone.png"},
  {name:"Protector de Cable", desc:"Protects your charging cables.", category:"protector", price:9000,img:"protector-cable.png"},
  {name:"Wireless Charger", desc:"Fast wireless charger.", category:"charger", price:35000,img:"wireless-charger.png"}
];

let cart=[];
const productList=document.getElementById('product-list');
const cartButton=document.getElementById('cart-button');
const cartModal=document.getElementById('cart-modal');
const cartItemsEl=document.getElementById('cart-items');
const cartTotalEl=document.getElementById('cart-total');
const toast=document.getElementById('toast');

function renderProducts(){
  productList.innerHTML='';
  products.forEach(p=>{
    const card=document.createElement('div');
    card.className='product-card';
    card.innerHTML=`
      <img src="${p.img}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p>Gs. ${p.price.toLocaleString()}</p>
      <button onclick="addToCart('${p.name}', this)">Add to Cart</button>
    `;
    productList.appendChild(card);
  });
}

function addToCart(name, btn){
  const prod=products.find(p=>p.name===name);
  const existing=cart.find(c=>c.name===name);
  if(existing){ existing.qty+=1; } 
  else { cart.push({name:prod.name, price:prod.price, qty:1}); }

  cartButton.textContent=`Cart (${cart.reduce((a,b)=>a+b.qty,0)})`;
  renderCart();
  showToast(`${name} agregado al carrito!`);
  animateImageToCart(btn);
}

function removeFromCart(name){
  cart=cart.filter(c=>c.name!==name);
  cartButton.textContent=`Cart (${cart.reduce((a,b)=>a+b.qty,0)})`;
  renderCart();
  showToast(`${name} eliminado del carrito!`);
}

function renderCart(){
  cartItemsEl.innerHTML='';
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.qty;
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      <span>${item.name} x${item.qty}</span>
      <span>Gs. ${(item.price*item.qty).toLocaleString()}</span>
      <button onclick="removeFromCart('${item.name}')">✕</button>
    `;
    cartItemsEl.appendChild(div);
  });
  cartTotalEl.textContent=`Total: Gs. ${total.toLocaleString()}`;
}

function toggleCart(){cartModal.classList.toggle('show');}
cartButton.addEventListener('click',toggleCart);

function showToast(message){
  toast.textContent=message;
  toast.style.opacity='1';
  toast.style.transform='translateY(0)';
  setTimeout(()=>{
    toast.style.opacity='0';
    toast.style.transform='translateY(-20px)';
  },2000);
}

function checkout(){
  if(cart.length===0){alert("Cart is empty!");return;}
  let msg="Hola, quiero confirmar mi pedido:\n";
  cart.forEach(i=>msg+=`${i.name} x${i.qty} - Gs. ${(i.price*i.qty).toLocaleString()}\n`);
  const total=cart.reduce((a,b)=>a+b.price*b.qty,0);
  msg+=`Total: Gs. ${total.toLocaleString()}`;
  const url=`https://wa.me/595982164843?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

// Animación de imagen volando al carrito
function animateImageToCart(btn){
  const card = btn.closest('.product-card');
  const img = card.querySelector('img');
  const imgClone = img.cloneNode(true);
  const rect = img.getBoundingClientRect();
  imgClone.style.position='fixed';
  imgClone.style.left=rect.left+'px';
  imgClone.style.top=rect.top+'px';
  imgClone.style.width=rect.width+'px';
  imgClone.style.height=rect.height+'px';
  imgClone.style.transition='all 0.8s ease-in-out';
  imgClone.style.zIndex='1000';
  document.body.appendChild(imgClone);

  const cartRect=cartButton.getBoundingClientRect();
  setTimeout(()=>{
    imgClone.style.left=cartRect.left+'px';
    imgClone.style.top=cartRect.top+'px';
    imgClone.style.width='0px';
    imgClone.style.height='0px';
    imgClone.style.opacity='0';
  },10);

  imgClone.addEventListener('transitionend',()=>{ imgClone.remove(); });
}

renderProducts();
</script>

</body>
</html>
